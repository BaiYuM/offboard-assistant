name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Unit tests
        run: python -m unittest
      - name: Compile check
        run: python -m py_compile offboard_assistant.py offboard_gui.py offboard_gui_widgets.py ai_reviewer.py sync_bundle.py
      - name: CHANGELOG sanity
        run: |
          python -c "
          from pathlib import Path
          p = Path('CHANGELOG.md')
          if not p.exists():
              print('::warning::CHANGELOG.md is missing')
          else:
              text = p.read_text(encoding='utf-8')
              for marker in ('## Phase', 'Added', 'Tests', 'Hard rules preserved'):
                  if marker not in text:
                      print(f'::error::CHANGELOG.md missing marker: {marker}')
                      raise SystemExit(1)
              print('CHANGELOG.md OK')
          "
