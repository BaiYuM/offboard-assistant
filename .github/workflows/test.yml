name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Unit tests
        run: python -m unittest
      - name: Compile check
        run: python -m py_compile offboard_assistant.py offboard_gui.py sync_bundle.py

