name: build-windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements-packaging.txt
      - name: Build EXE
        run: python -m PyInstaller --noconfirm --windowed --name OffboardAssistant --add-data "README.md;." offboard_gui.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OffboardAssistant-windows
          path: dist/OffboardAssistant/
