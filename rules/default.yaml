# Default rules for Offboard Assistant.
#
# These three collections are the **built-in** defaults. To add your own
# without editing source, drop an ``overrides.yaml`` into:
#
#   <state_dir>/rules/overrides.yaml
#
# Override semantics:
# - ``saas_domains`` is **additive**: any domains you list are added to the
#   built-in list. The built-in list is never trimmed. This is intentional —
#   trimming SaaS domains to user-supplied ones would cause false negatives.
# - ``path_rules`` is **additive per-category**: if your override declares
#   the same ``category`` as a built-in rule, your needles extend that rule.
#   New ``category`` values are appended. Order is preserved
#   (built-ins first, then overrides).
# - ``secret_patterns`` is **additive**: your patterns are appended to the
#   built-in list. Use the same regex syntax as Python's ``re`` module.
#
# When ``overrides.yaml`` is malformed, the loader logs a warning and falls
# back to built-ins only — the tool never crashes on a bad override file.
#
# Schema reference: keep this comment block at the top so the user can
# discover the override mechanism when reading the file.

saas_domains:
  - github.com
  - gitlab.com
  - notion.so
  - slack.com
  - linear.app
  - figma.com
  - miro.com
  - asana.com
  - jira.atlassian.com
  - confluence.atlassian.com

path_rules:
  - category: codex_temp_plugin_cache
    needles:
      - "/.codex/.tmp/plugins/"
    label: "Codex 临时插件缓存"
    recommendation: recommend_cleanup
  - category: codex_temp_cache
    needles:
      - "/.codex/.tmp/"
    label: "Codex 临时缓存"
    recommendation: recommend_cleanup
  - category: ai_tool_config
    needles:
      - "/.codex/"
      - "/.claude/"
      - "/.cursor/"
    label: "AI/开发工具配置"
    recommendation: review_required
  - category: cloud_cli_config
    needles:
      - "/.aws/"
      - "/.azure/"
    label: "云服务 CLI 配置"
    recommendation: review_required
  - category: ssh_config
    needles:
      - "/.ssh/"
    label: "SSH 配置/密钥"
    recommendation: review_required
  - category: environment_file
    needles:
      - "/.env"
    label: "环境变量文件"
    recommendation: review_required
  - category: package_registry_config
    needles:
      - "/.npmrc"
      - "/.pypirc"
    label: "包管理器认证配置"
    recommendation: review_required

secret_patterns:
  - kind: "OpenAI API key"
    pattern: '\bsk-(?:proj-|svcacct-)?[A-Za-z0-9_-]{20,}\b'
  - kind: "Anthropic API key"
    pattern: '\bsk-ant-[A-Za-z0-9_-]{20,}\b'
  - kind: "GitHub token"
    pattern: '\bgh[pousr]_[A-Za-z0-9_]{30,}\b'
  - kind: "AWS access key id"
    pattern: '\b(?:AKIA|ASIA)[A-Z0-9]{16}\b'
  - kind: "Google API key"
    pattern: '\bAIza[0-9A-Za-z_-]{35}\b'
  - kind: "Slack token"
    pattern: '\bxox[baprs]-[A-Za-z0-9-]{20,}\b'
  - kind: "Generic bearer token"
    pattern: '(?i)\bBearer\s+[A-Za-z0-9._~+/=-]{24,}\b'
  - kind: "Generic secret assignment"
    pattern: '(?i)\b(?:api[_-]?key|secret|token|access[_-]?key|private[_-]?key|password)\b\s*[:=]\s*["'']?([A-Za-z0-9._~+/=-]{16,})'
